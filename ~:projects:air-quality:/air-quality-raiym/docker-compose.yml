services:
  mosquitto:
    image: eclipse-mosquitto:2.0
    restart: unless-stopped
    ports:
      - '1883:1883'
      - '9001:9001'
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    volumes:
      - ./backend:/app
    environment:
      - ENABLE_MQTT=true
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
    ports:
      - '8000:8000'
    depends_on:
      - mosquitto

  simulator:
    image: python:3.11-slim
    restart: unless-stopped
    volumes:
      - ./simulator:/simulator
    command: sh -c "pip install --no-cache-dir paho-mqtt && sleep 5 && python /simulator/simulator.py --sensor-id sim-1 --mode classroom --interval 5 --broker mosquitto"
    depends_on:
      - mosquitto
